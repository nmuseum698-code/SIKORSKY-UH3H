<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Naval Aviation Museum – Sikorsky UH-3H</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background-color:#0b1c2d;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:900px;
background:#102a43;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
text-align:center;
position:relative;
padding-top:90px;
}

/* LOGOS */

.logo{
position:absolute;
top:10px;
width:120px;   /* SAME SIZE FOR BOTH */
height:120px;
object-fit:contain;
}

.logo-left{
left:20px;
}

.logo-right{
right:20px;
}

/* HEADER */

header{
background:linear-gradient(135deg,#0f4c75,#3282b8);
padding:20px;
}

header h1{
margin:0;
letter-spacing:2px;
}

/* IMAGE */

.image-section img{
width:100%;
height:auto;
}

/* CONTENT */

.content{
padding:25px;
}

.content h2{
margin-top:0;
}

/* BUTTONS */

.buttons{
margin-top:20px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

button{
background:#3282b8;
border:none;
color:white;
padding:12px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1b6ca8;
}

/* FOOTER */

footer{
background:#081827;
padding:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGOS -->

<img src="NAM.png" class="logo logo-left" alt="Naval Aviation Museum Logo">
<img src="IN.png" class="logo logo-right" alt="Indian Navy Logo">

<header>
<h1>NAVAL AVIATION MUSEUM</h1>
</header>

<div class="image-section">
<img src="sikorsky-uh3h.jpg" alt="Sikorsky UH-3H Helicopter">
</div>

<div class="content">

<h2>Sikorsky UH-3H</h2>
<p>Select a language to hear the aircraft narration</p>

<div class="buttons">

<button onclick="playEnglish()">🔊 English</button>
<button onclick="playHindi()">🔊 हिंदी</button>
<button onclick="stopAudio()">⏹ Stop</button>

</div>

</div>

<footer>
Naval Aviation Museum Goa | Exhibit Audio Guide
</footer>

<audio id="englishAudio" src="sikorsky english.mp3"></audio>
<audio id="hindiAudio" src="sikorsky hindi.mp3"></audio>

</div>

<script>

const englishAudio=document.getElementById("englishAudio");
const hindiAudio=document.getElementById("hindiAudio");

function playEnglish(){
hindiAudio.pause();
hindiAudio.currentTime=0;
englishAudio.play();
}

function playHindi(){
englishAudio.pause();
englishAudio.currentTime=0;
hindiAudio.play();
}

function stopAudio(){
englishAudio.pause();
hindiAudio.pause();
englishAudio.currentTime=0;
hindiAudio.currentTime=0;
}

</script>

</body>
</html>
